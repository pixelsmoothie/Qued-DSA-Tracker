name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
 
      - name: Pre-create Release on Public Repo
        run: |
          gh release create ${{ github.ref_name }} --repo pixelsmoothie/Qued-DSA-Tracker --title "${{ github.ref_name }} Stable" --notes "Automated distribution" --draft || true
        env:
          GH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
 
      - name: Install dependencies
        run: npm install

      - name: Build App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder"
        with:
          tagName: v__VERSION__
          releaseName: 'v1.0.1 Stable'
          releaseDraft: true
          prerelease: false

      - name: Ship to Public Repo
        run: |
          # 1. Create the release on the PUBLIC repo (pointing to its own main branch)
          gh release create v1.0.1 --repo pixelsmoothie/Qued-DSA-Tracker --title "v1.0.1 Stable" --notes "Official Platinum Release" --target master || echo "Release already exists"
          
          # 2. Upload the artifacts
          gh release upload v1.0.1 src-tauri/target/release/bundle/nsis/*.exe --repo pixelsmoothie/Qued-DSA-Tracker --clobber
          gh release upload v1.0.1 src-tauri/target/release/bundle/msi/*.msi --repo pixelsmoothie/Qued-DSA-Tracker --clobber
          
          # 3. Handle the updater JSON if generated
          if [ -f "src-tauri/target/release/bundle/updater/latest.json" ]; then
            gh release upload v1.0.1 src-tauri/target/release/bundle/updater/latest.json --repo pixelsmoothie/Qued-DSA-Tracker --clobber
          fi
        env:
          GH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
